name: agentops-sentinel
description: "AgentOps Sentinel: AI Agent Telemetry and Observability Platform"

# This is a standard generic deployment configuration.
# If your hackathon provided a specific schema, replace this with their template!
services:
  frontend:
    type: web
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    port: 3000
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_SIGNOZ_API_URL=${NEXT_PUBLIC_SIGNOZ_API_URL}

  # Uncomment if the backend is also required to run in the deployment container
